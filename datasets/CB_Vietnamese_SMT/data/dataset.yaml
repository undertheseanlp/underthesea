- examples:
  - Làm sao để được giảm giá cho sản phẩm này?
  - Có khuyến mãi gì cho sản phẩm này không?
  name: product.discounts
  responses:
  - Chúng tôi có chương trình giảm giá cho khách hàng thường xuyên. Bạn có thể đăng
    ký thành viên hoặc theo dõi trang web của chúng tôi để nhận thông tin mới nhất
    về khuyến mãi.
  - Chúng tôi hiện đang có chương trình khuyến mãi giảm giá cho sản phẩm này, bạn
    có thể xem chi tiết trên trang web của chúng tôi hoặc liên hệ với nhân viên bán
    hàng để biết thêm thông tin.
- examples:
  - Bạn có sản phẩm tương tự nào khác không?
  - Tôi đang tìm kiếm sản phẩm này, nhưng không biết có sản phẩm nào tương tự không?
  name: product.alternatives
  responses:
  - Chúng tôi có một số sản phẩm tương tự khác, bạn có thể tham khảo trên trang web
    của chúng tôi hoặc liên hệ với nhân viên bán hàng để được tư vấn chi tiết hơn.
  - Có, chúng tôi có một số sản phẩm tương tự khác. Bạn có thể xem chi tiết trên trang
    web của chúng tôi hoặc liên hệ với nhân viên bán hàng để được tư vấn chi tiết
    hơn.
- examples:
  - Sản phẩm này không phù hợp với tôi, tôi có thể đổi lấy sản phẩm khác không?
  - Tôi muốn đổi sản phẩm này vì không vừa ý.
  name: product.exchanges
  responses:
  - Đối với những trường hợp không vừa ý với sản phẩm, chúng tôi có chính sách đổi
    trả sản phẩm trong vòng 7 ngày. Bạn có thể xem chi tiết chính sách trên trang
    web của chúng tôi hoặc liên hệ với nhân viên bán hàng để được tư vấn chi tiết
    hơn.
  - Nếu sản phẩm của bạn không vừa ý hoặc gặp sự cố kỹ thuật, bạn có thể liên hệ với
    chúng tôi để được hỗ trợ đổi hoặc trả sản phẩm. Chi tiết hơn vui lòng xem trên
    trang web của chúng tôi hoặc liên hệ với nhân viên bán hàng.
- examples:
  - Bạn có thể giúp tôi giải đáp thắc mắc về sản phẩm không?
  - Tôi cần hỗ trợ về sản phẩm
  name: customer.service.help
  responses:
  - Chúng tôi rất vui được giúp bạn giải đáp mọi thắc mắc liên quan đến sản phẩm của
    chúng tôi. Vui lòng cho chúng tôi biết bạn cần trợ giúp về vấn đề gì cụ thể.
  - Tất cả nhân viên hỗ trợ của chúng tôi đều sẵn sàng hỗ trợ bạn giải quyết các vấn
    đề liên quan đến sản phẩm. Bạn cần trợ giúp về vấn đề gì ư?
- examples:
  - Tôi muốn phản hồi về sản phẩm
  - Làm thế nào để gửi phản hồi về sản phẩm cho bạn?
  name: customer.service.feedback
  responses:
  - Chúng tôi luôn hoan nghênh mọi ý kiến đóng góp và phản hồi từ khách hàng để cải
    thiện sản phẩm của chúng tôi. Bạn có thể gửi phản hồi của mình thông qua trang
    web của chúng tôi hoặc liên hệ với nhân viên hỗ trợ của chúng tôi để được hỗ trợ.
  - Rất cảm ơn vì bạn đã quan tâm đến việc phản hồi sản phẩm của chúng tôi. Bạn có
    thể gửi phản hồi của mình qua email hoặc liên hệ với nhân viên hỗ trợ của chúng
    tôi để được hỗ trợ.
- examples:
  - Bạn thích xem phim hay xem chương trình TV hơn?
  - Bạn xem chương trình TV nào thường xuyên?
  name: topic.tvshows
  responses:
  - Tôi không có sở thích xem chương trình TV cụ thể nào, nhưng tôi có thể giúp bạn
    tìm kiếm thông tin về chương trình TV và phim ảnh nếu bạn muốn.
  - Tôi không thường xem chương trình TV, nhưng nếu bạn có bất kỳ yêu cầu nào về thông
    tin về chương trình TV hoặc phim ảnh, hãy cho tôi biết và tôi sẽ giúp bạn tìm
    kiếm thông tin cần thiết.
- examples:
  - Có món gì ngon không?
  - Mình muốn ăn món mới, bạn có thể giới thiệu không?
  - Bạn có biết quán ngon ở đâu không?
  - Bạn có thích ăn đồ chay không?
  - Bạn thích ăn gì?
  name: topic.food
  responses:
  - Mình thích ăn đồ Việt Nam, đặc biệt là phở và bún chả. Còn bạn thì sao?
  - Mình thích ăn món Nhật như sushi và sashimi. Bạn đã thử chưa?
- examples:
  - Mình muốn tìm một trò chơi giải trí, bạn có giới thiệu cho mình không?
  - Bạn có biết game mới nào hay không?
  - Bạn đã từng chơi game này chưa?
  - Bạn thường chơi game gì?
  - Bạn có chơi game không?
  name: topic.gaming
  responses:
  - Mình thích chơi game thể thao và game bắn súng. Bạn đã thử chưa?
  - Mình thích chơi game đua xe và game nhập vai. Còn bạn thì sao?
- examples:
  - Bạn có tin tưởng vào chính phủ không?
  - Bạn nghĩ ai sẽ thắng trong cuộc bầu cử?
  - Bạn nghĩ nên thay đổi luật lệ gì trong nước?
  - Bạn có định hướng chính trị của mình chưa?
  - Bạn nghĩ gì về chính trị hiện nay?
  name: topic.politics
  responses:
  - Tôi không có quan điểm rõ ràng về chính trị. Bạn nghĩ sao về vấn đề đó?
  - Tôi không thích thảo luận về chính trị. Có thể chúng ta nói về chủ đề khác được
    không?
- examples:
  - Mình muốn tổ chức một sự kiện vào cuối tuần này, bạn có thể giúp mình sắp xếp
    không?
  - Bạn có thể giúp mình sắp xếp lịch làm việc không?
  - Bạn có thể giúp mình đặt lịch khám bệnh được không?
  - Mình muốn tạo lịch trình đi du lịch, bạn có thể giúp mình được không?
  - Mình muốn hẹn gặp bạn vào thứ Hai lúc 10 giờ sáng, bạn có rảnh không?
  name: event.scheduling
  responses:
  - Tất nhiên, mình sẽ giúp bạn sắp xếp lịch làm việc.
