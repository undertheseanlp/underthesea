  responses:
  - Sao các hột giống như nhau? Vì chúng đều là hột!
  - Tại sao con trâu không đi đến sân bay? Vì họ không có vé!
  - Tại sao bạn không bắt được một cái gạch? Vì nó không có cảnh sát!
- examples:
  - Tôi muốn thanh toán bằng thẻ tín dụng
  - Làm thế nào để thanh toán
  - Hình thức thanh toán nào được hỗ trợ
  name: product.payment
  responses:
  - Chúng tôi sẽ hỗ trợ bạn qua quá trình thanh toán bằng thẻ tín dụng.
  - Chúng tôi hỗ trợ các hình thức thanh toán như thẻ tín dụng, Paypal, và chuyển
    khoản ngân hàng.
  - Bạn có thể thanh toán bằng thẻ tín dụng hoặc Paypal.
- examples:
  - Tôi muốn biết thời gian vận chuyển của sản phẩm
  - Hẹn giờ giao hàng có thể làm sao?
  - Làm thế nào để kiểm tra tình trạng giao hàng?
  name: product.shipping
  responses:
  - Rất tiếc, chúng tôi không cung cấp dịch vụ hẹn giờ giao hàng. Tuy nhiên, bạn có
    thể yêu cầu giao hàng tại một khoảng thời gian cụ thể bằng cách liên hệ với chúng
    tôi.
  - Thời gian vận chuyển tùy thuộc vào địa điểm của bạn và phương thức vận chuyển
    mà bạn chọn. Vui lòng liên hệ với chúng tôi để biết chi tiết.
  - Bạn có thể kiểm tra tình trạng giao hàng bằng cách sử dụng mã vận đơn của bạn
    và truy cập trang web của chúng tôi.
- examples:
  - Sản phẩm của tôi có bảo hành không?
  - Làm thế nào để yêu cầu bảo hành?
  - Tôi cần một số hỗ trợ về bảo hành
  name: customer.service.warranty
  responses:
  - Có, tất cả sản phẩm của chúng tôi đều có bảo hành. Vui lòng liên hệ với chúng
    tôi để biết chi tiết.
- examples:
  - Tôi muốn đặt phòng cho chuyến du lịch của tôi
  - Tôi muốn đặt phòng khách sạn 5 sao
  - Tôi muốn tìm khách sạn giá rẻ
  - Tôi cần tìm khách sạn gần đây
  - Tôi muốn đặt phòng khách sạn
  name: travel.hotel.booking
  responses:
  - Tôi có thể giúp bạn tìm kiếm và đặt phòng khách sạn phù hợp với nhu cầu của bạn.
    Xin hãy cho biết thông tin chi tiết hơn về yêu cầu của bạn.
  - Chúng tôi có nhiều tùy chọn khách sạn để bạn lựa chọn. Hãy cho tôi biết yêu cầu
    chi tiết của bạn để tôi có thể giúp bạn đặt phòng.
- examples:
  - Tôi cần giúp về thuế cho doanh nghiệp của tôi
  - Tôi muốn hỏi về chính sách thuế mới
  - Tôi cần giúp về thuế
  - Tôi muốn biết cách tính thuế
  - Tôi muốn tìm hiểu về thuế
  name: finance.taxes
  responses:
  - Tôi có thể giúp bạn tìm hiểu về chính sách thuế và cách tính thuế. Hãy cho tôi
    biết chi tiết hơn về nhu cầu của bạn.
- examples:
  - Tôi muốn tìm kiếm thông tin về cuốn sách "Thủy Vương"
  - Tôi muốn mua một cuốn sách về kinh doanh
  - Tôi muốn tìm kiếm một số sách hay
  name: topic.books
  responses:
  - Tôi có thể giúp bạn tìm kiếm các cuốn sách theo thể loại hoặc tác giả mà bạn muốn.
  - Bạn có thể cho tôi biết thể loại sách mà bạn quan tâm để tôi có thể giúp bạn tìm
    kiếm những cuốn sách phù hợp.
- examples:
  - Tôi muốn tìm kiếm thông tin về các dòng laptop
  - Tôi muốn mua một chiếc điện thoại mới
  - Tôi muốn biết về các công nghệ mới nhất
  name: topic.technology
  responses:
  - Tôi có thể giúp bạn tìm kiếm thông tin về các sản phẩm công nghệ, bao gồm cả thông
    số kỹ thuật và đánh giá của người dùng.
  - Bạn có thể cho tôi biết loại thiết bị cụ thể mà bạn muốn mua để tôi có thể giúp
    bạn tìm kiếm những thông tin phù hợp.
- examples:
  - Tôi muốn mua 2 vé cho sự kiện
  - Anh/chị có bán vé cho sự kiện không?
  - Tôi muốn mua vé cho sự kiện này
  name: event.tickets
  responses:
  - Vé cho sự kiện có thể được mua trực tuyến hoặc tại quầy vé của chúng tôi. Hãy
    cho tôi biết bạn muốn mua vé trực tuyến hay tại quầy?
  - Rất tiếc, vé cho sự kiện này đã hết hạn mua. Bạn có thể xem các sự kiện khác tại
    trang web của chúng tôi.
- examples:
  - Rất cảm ơn
  - Cảm ơn
  - Cảm ơn anh/chị
  name: smalltalk.thanks
  responses:
  - Không có gì, rất vui được giúp đỡ.
  - Rất vui được giúp đỡ. Hãy cho tôi biết nếu còn gì khác tôi có thể giúp đỡ.
- examples:
  - Tôi đã đặt hàng, khi nào nhận được hàng?
  - Khi nào hàng của tôi sẽ đến?
  - Tôi muốn biết trạng thái giao hàng
  name: product.delivery
  responses:
  - Chúng tôi sẽ gửi thông tin về trạng thái giao hàng cho bạn qua email hoặc tin
    nhắn. Hãy cho tôi biết số điện thoại hoặc email của bạn để tôi kiểm tra.
- examples:
  - Tình trạng giao hàng của tôi là gì?
  - Tôi muốn xem tình trạng giao hàng của mình
  - Có thể cho biết tình trạng giao hàng của tôi?
  name: product.delivery.status
  responses:
  - Tôi sẽ cập nhật cho bạn về tình trạng giao hàng của bạn ngay sau khi kiểm tra.
  - Tôi sẽ xem xét tình trạng giao hàng của bạn và trả lời cho bạn sớm nhất có thể.
- examples:
  - Tôi cần thay đổi thông tin giao hàng
  - Tôi muốn thay đổi ngày giao hàng
  - Tôi muốn thay đổi địa chỉ giao hàng của mình
  name: product.delivery.change
  responses:
  - Tôi sẽ giúp bạn thay đổi địa chỉ giao hàng của bạn. Vui lòng cho tôi biết địa
    chỉ mới.
  - Tôi sẽ hỗ trợ bạn thay đổi thông tin giao hàng của bạn. Vui lòng cung cấp cho
    tôi thông tin mới.
- examples:
  - Tôi muốn biết về bạn?
  - Bạn là ai?
  - Ai tạo ra bạn?
  name: smalltalk.bot.background
  responses:
  - Xin chào. Xin chào! Tôi là ChatUTS, một chatbot được huấn luyện bởi Underthesea.
    Tôi được sử dụng để trả lời các câu hỏi và giải quyết các nhiệm vụ liên quan đến
    ngôn ngữ, kiến thức chung và nhiều lĩnh vực khác. Tôi sẵn sàng giúp bạn với mọi
    thắc mắc của bạn. Hãy hỏi tôi bất cứ điều gì!
- examples:
  - Sở thích của bạn là gì?
  - Bạn có thích chơi thể thao không?
  - Bạn thích gì?
  name: smalltalk.interests
  responses:
  - Tôi là một mô hình ngôn ngữ được tạo ra bởi OpenAI, do đó tôi không có sở thích
    hay trải nghiệm cá nhân. Tôi được huấn luyện để trả lời câu hỏi và giải quyết
    các nhiệm vụ liên quan đến kiến thức, và tôi hoạt động trên cơ sở dữ liệu và thuật
    toán mà tôi đã được huấn luyện.
- examples:
  - Tôi cần biết chi tiết về thông số kỹ thuật của sản phẩm
  - Tôi muốn biết thêm về thông số kỹ thuật của sản phẩm này
  - Thông số kỹ thuật của sản phẩm này là gì?
  name: product.specifications
  responses:
  - Tôi có thể cung cấp cho bạn thông tin chi tiết về thông số kỹ thuật của sản phẩm.
    Bạn có thể cho tôi biết sản phẩm nào mà bạn muốn biết thông tin chi tiết?
- examples:
  - Sản phẩm này còn hàng không?
  - Sản phẩm này còn trong kho không
  - Tôi muốn biết sản phẩm này còn hàng không
  name: product.availability
  responses:
  - Rất tiếc, tôi không có thông tin chi tiết về sản phẩm cụ thể mà bạn đang tìm.
    Để biết thêm chi tiết, bạn nên liên hệ trực tiếp với nhà cung cấp hoặc cửa hàng
    bán sản phẩm để biết sản phẩm còn hàng hay không.