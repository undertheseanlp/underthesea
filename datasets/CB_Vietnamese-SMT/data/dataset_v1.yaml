  name: product.order
  responses:
  - Tôi sẽ cần biết thêm thông tin về sản phẩm mà bạn muốn đặt hàng.
  - Rất vui được giúp đỡ bạn! Bạn cần tìm sản phẩm gì?
  - Tôi có thể giúp bạn đặt hàng sản phẩm. Bạn cần tìm sản phẩm gì?
  - Bạn có thể cho tôi biết sản phẩm nào mà bạn muốn đặt hàng?
- examples:
