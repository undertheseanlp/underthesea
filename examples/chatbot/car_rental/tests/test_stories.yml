stories:
- story: happy path 1
  steps:
  - user: |
      hello there!
    intent: greet
  - action: utter_greet
  - user: |
      amazing
    intent: mood_great
  - action: utter_happy

- story: Handoff to agent
  steps:
  - user: |
      tôi muốn nói chuyện với CSKH
    intent: small_talk.agent_redirect
  - action: utter_agent_redirect

- story: Rent 4 seat car
  steps:
  - user: |
      tôi muốn đặt một xe 4 chỗ
    intent: car_rental.reservation_create
  - action: utter_reservation_create
