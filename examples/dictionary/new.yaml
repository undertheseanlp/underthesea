văn hóa:
- def: Trình độ cao trong sinh hoạt xã hội, biểu hiện của văn minh
  examples:
  - Sống có văn hoá. Ăn nói thiếu văn hoá
  tag: N
phần lớn:
- def: Số tương đối lớn trong một số người hay vật
  examples:
  - Phần lớn cán bộ cơ quan đang đi công tác xa
  tag: D
hoàng đế:
- def: Vua một nước có chư hầu; vua một nước lớn đối với các nước nhỏ.
liên minh:
- def: Sự kết hợp giữa hai hay nhiều lực lượng để cùng chiến đấu cho một mục đích chung.
  examples:
  - khối liên minh công nông
  tag: N
ủy ban:
- def: Tổ chức được bầu ra để làm nhiệm vụ nào đó.
  examples:
  - Uỷ ban khởi nghĩa.
  - Uỷ ban dự thảo hiến pháp.
  tag: N
lĩnh vực:
- def: Toàn thể nội dung bao gồm trong một ngành hoạt động và, nói riêng, một ngành khoa học, nghệ thuật...
  examples:
  - Lĩnh vực kinh tế
  - Lĩnh vực kỹ thuật
  - Lĩnh vực sử học
  tag: N
tiểu học:
- def: cấp học thấp nhất trong bậc học giáo dục phổ thông, từ lớp một đến lớp năm
  examples:
  - phổ cập tiểu học
  - giáo viên tiểu học
  tag: N
tương lai:
- def: Đời sống, cuộc sống sau này
  examples:
  - Lo cho tương lai của các con.
  - Xây dựng tương lai.
  tag: N
nguyện vọng:
- def: Điều mong muốn.
  examples:
  - Giải quyết theo nguyện vọng quần chúng
  - Nguyện vọng chính đáng
  tag: N
bóng đá:
- def: Môn thể thao bắt nguồn từ Anh gồm có hai đội, mỗi đội có mười một cầu thủ cố gắng đưa bóng vào khung thành đội bạn bằng cách sút vào bóng. Trong tập luyện hay chơi nghiệp dư,..., mỗi đội thường có thể có khoảng năm, sáu, bảy,... hay bất kỳ số lượng cầu thủ như thế nào.
  examples:
  - Bóng đá là môn thể thao được nhiều người yêu thích.
  tag: N